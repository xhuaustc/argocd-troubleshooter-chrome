<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Orange rounded square background -->
  <rect width="128" height="128" rx="28" fill="#EF7B4D"/>

  <!-- Stethoscope earpiece (U-shape at top) -->
  <path d="M51 20 v10 c0 9 6 14 13 14 s13-5 13-14 v-10"
        fill="none" stroke="#FFF" stroke-width="7" stroke-linecap="round"/>

  <!-- Tube from earpiece center, flowing into circular arrow -->
  <path d="M64 44 v6 A22 22 0 1 1 42 72"
        fill="none" stroke="#FFF" stroke-width="7" stroke-linecap="round"/>

  <!-- Arrow head (pointing upward at left of circle) -->
  <polygon points="42,58 32,74 52,74" fill="#FFF"/>

  <!-- Stethoscope chest piece (at bottom of circle loop) -->
  <circle cx="64" cy="94" r="8" fill="#FFF"/>
</svg>
